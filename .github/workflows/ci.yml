name: deploy to railway

on:
  push:
    branches: [ main ]

jobs: #lo que realiza el codigo
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' 
          
      - name: Install dependencies
        run: npm install
        
      - name: pruebas        
        run: npm run test || echo "no hay pruebas"
        
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli
        
      - name: Deploy a Railway
        run: railway up
        env: 
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN2 }}
